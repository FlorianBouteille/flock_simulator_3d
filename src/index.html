<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cameras</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <button id ="addFish" class="addButton">Add a Fish !</button>
    <button id ="rmFish" class="rmButton">Remove a Fish !</button>
    <input type ="range" id="current" class="currentSlider" min="0" max="3" value="0.3" step="0.05">
    <label for="current">Current</label>
    <input type ="range" id="separation" class="sliderControl" min="0" max="3" value="1.5" step="0.1">
    <label for="separation">Separation</label>
    <input type ="range" id="cohesion" class="sliderControl" min="0" max="3" value="0.8" step="0.1">
    <label for="cohesion">Cohesion</label>
    <input type ="range" id="alignment" class="sliderControl" min="0" max="3" value="0.3" step="0.1">
    <label for="alignment">Alignment</label>
    <canvas class="webgl"></canvas>
    <script type="module" src="./script.js"></script>
</body>
</html>
